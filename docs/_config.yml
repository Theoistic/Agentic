title: Agentic
description: A lightweight .NET library for building LLM-powered agents with streaming chat, MCP tool hosting, context compaction, and vector storage.
baseurl: "/Agentic"
url: "https://theoistic.github.io"

theme: just-the-docs

# Logo / favicon
# logo: "/assets/images/logo.png"

# Footer
footer_content: "Copyright &copy; 2025 Theoistic. Distributed under the <a href=\"https://github.com/Theoistic/Agentic/blob/main/LICENSE\">MIT License.</a>"

# Color scheme
color_scheme: dark

# Enable search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Aux links in header
aux_links:
  "GitHub":
    - "https://github.com/Theoistic/Agentic"
  "NuGet":
    - "https://www.nuget.org/packages/Theoistic.Agentic"

aux_links_new_tab: true

# Navigation order
nav_sort: order

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchors
heading_anchors: true

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata

defaults:
  - scope:
      path: ""
    values:
      layout: default

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false
